# Stack standalone do Condfy + Bravas Report.
# Roda 1 container Node + cron, dispara daily.mjs no schedule configurado.
# Logs centralizados via `docker logs condfy-bravas-cron`.

services:
  condfy-bravas-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: condfy-bravas-report:latest
    container_name: condfy-bravas-cron
    restart: unless-stopped
    env_file: .env.production
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ./relatorios:/app/relatorios
    healthcheck:
      test: ["CMD", "pgrep", "crond"]
      interval: 60s
      timeout: 5s
      retries: 3
